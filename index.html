<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EV Akkuraportti PRO+</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{background:#0d0d0d;color:white;font-family:sans-serif;text-align:center;}
.container{max-width:420px;margin:auto;}

input, textarea{
 width:90%;padding:15px;margin:10px;
 font-size:16px;border-radius:10px;
 border:none;background:#1c1c1c;color:white;
}

button{
 width:90%;padding:15px;margin:10px;
 font-size:16px;border-radius:10px;
 border:none;background:#4caf50;color:white;
}

.card{
 background:#1c1c1c;padding:20px;
 border-radius:15px;margin-top:20px;
}

.bar{height:20px;background:#333;border-radius:10px;}
.fill{height:100%;width:0%;background:#4caf50;}

canvas{margin-top:20px;}
</style>
</head>

<body>

<div class="container">

<h1>🔋 EV Akkuraportti PRO+</h1>

<input id="max" placeholder="Max jännite">
<input id="min" placeholder="Min jännite">
<input id="soc" placeholder="SOC % (valinnainen)">

<input type="file" id="fileInput" accept=".csv" onchange="lueOBD()">

<textarea id="obdData" placeholder="TAI liitä OBD data tähän"></textarea>
<button onclick="parseOBD()">📋 Lue liitetty data</button>

<button onclick="laske()">Analysoi</button>
<button onclick="tallenna()">💾 Tallenna</button>
<button onclick="teePDF()">📄 PDF</button>
<button onclick="obdDemo()">🔵 OBD demo</button>

<div class="card">
  <h2 id="status">-</h2>
  <h1 id="soh">--%</h1>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <p id="details"></p>
</div>

<canvas id="chart"></canvas>

</div>

<script>

let historyData = JSON.parse(localStorage.getItem("evdata") || "[]");

// ===== ANALYYSI =====
function laske(){
 let max = parseFloat(maxEl().value);
 let min = parseFloat(minEl().value);
 let soc = parseFloat(document.getElementById("soc").value);

 if(isNaN(max)||isNaN(min)){
   alert("Syötä max ja min!");
   return;
 }

 let delta = max - min;
 let soh = 100 - (delta * 1200);
 soh = Math.max(0, Math.min(100, soh));

 let status = soh>90?"Erinomainen":soh>75?"Hyvä":soh>60?"Kohtalainen":"Heikko";
 let color = soh>90?"#00e676":soh>75?"#aeea00":soh>60?"#ffd600":"#ff1744";

 document.getElementById("soh").innerText = soh.toFixed(1)+"%";
 document.getElementById("status").innerText = status;

 let fill = document.getElementById("fill");
 fill.style.width = soh+"%";
 fill.style.background = color;

 let reliability = "Normaali";
 let note = "";

 if(!isNaN(soc)){
   if(soc > 80){reliability="Korkea";note="Mittaus tarkempi";}
   else if(soc < 20){reliability="Heikompi";note="Suositus >50%";}
 }

 document.getElementById("details").innerText =
 "DELTA: " + delta.toFixed(3) + " V\n" +
 "Luotettavuus: " + reliability + "\n" + note;

 window.lastData = {
   soh, delta, soc:isNaN(soc)?null:soc,
   reliability,
   date:new Date().toLocaleString()
 };
}

// ===== CSV =====
function lueOBD(){
 let file = document.getElementById("fileInput").files[0];
 if(!file) return;

 let reader = new FileReader();

 reader.onload = function(e){
   let lines = e.target.result.split("\n");
   let last = lines[lines.length-1].split(",");

   let volts=[];
   last.forEach(p=>{
     let v=parseFloat(p);
     if(v>2&&v<5) volts.push(v);
     if(v>=0&&v<=100) document.getElementById("soc").value=v;
   });

   if(volts.length<2){alert("Ei dataa");return;}

   maxEl().value = Math.max(...volts).toFixed(3);
   minEl().value = Math.min(...volts).toFixed(3);

   laske();
 };

 reader.readAsText(file);
}

// ===== COPY DATA =====
function parseOBD(){
 let text = document.getElementById("obdData").value;
 let nums = text.match(/\d+\.\d+/g);

 if(!nums){alert("Ei dataa");return;}

 let volts = nums.map(n=>parseFloat(n)).filter(v=>v>2&&v<5);

 maxEl().value = Math.max(...volts).toFixed(3);
 minEl().value = Math.min(...volts).toFixed(3);

 laske();
}

// ===== SAVE =====
function tallenna(){
 if(!window.lastData){alert("Laske ensin");return;}

 historyData.push(window.lastData);
 localStorage.setItem("evdata", JSON.stringify(historyData));
 alert("Tallennettu ✔");

 drawChart();
}

// ===== CHART =====
function drawChart(){
 let ctx = document.getElementById("chart");

 if(window.chart) window.chart.destroy();

 window.chart = new Chart(ctx,{
   type:"line",
   data:{
     labels:historyData.map(d=>d.date),
     datasets:[{
       label:"SOH %",
       data:historyData.map(d=>d.soh)
     }]
   }
 });
}

// ===== PDF (AVILOO STYLE) =====
function teePDF(){
 if(!window.lastData){alert("Laske ensin");return;}

 const doc = new window.jspdf.jsPDF();

 // HEADER
 doc.setFillColor(0,0,0);
 doc.rect(0,0,210,25,"F");
 doc.setTextColor(255,255,255);
 doc.setFontSize(14);
 doc.text("BATTERY HEALTH CERTIFICATE", 15, 15);

 // DATA
 doc.setTextColor(0,0,0);
 doc.setFontSize(12);

 doc.text("SOH: "+window.lastData.soh.toFixed(1)+"%", 15,40);
 doc.text("Delta: "+window.lastData.delta.toFixed(3)+" V", 15,50);

 if(window.lastData.soc!==null){
   doc.text("SOC: "+window.lastData.soc+"%", 15,60);
 }

 doc.text("Luotettavuus: "+window.lastData.reliability, 15,70);

 // BAR
 let w = window.lastData.soh * 1.5;
 doc.setFillColor(200,200,200);
 doc.rect(15,80,150,10);
 doc.setFillColor(0,200,83);
 doc.rect(15,80,w,10);

 // FOOTER
 doc.setFontSize(8);
 doc.text("Testaaja: autosahkoapu.fi", 15,110);
 doc.text("Mittaus perustuu kennokohtaiseen jannite-eroon mittaushetkella.",15,115);
 doc.text("Raportti on suuntaa-antava eika vastaa valmistajan diagnostiikkaa.",15,120);

 doc.save("EV_Certificate.pdf");
}

// ===== DEMO =====
function obdDemo(){
 let max=4.1+Math.random()*0.02;
 let min=4.05+Math.random()*0.02;

 maxEl().value=max.toFixed(3);
 minEl().value=min.toFixed(3);

 laske();
}

// helpers
function maxEl(){return document.getElementById("max");}
function minEl(){return document.getElementById("min");}

drawChart();

</script>

</body>
</html>
