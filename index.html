<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EV Akkuraportti PRO+</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
 background:#0d0d0d;
 color:white;
 font-family:sans-serif;
 text-align:center;
}
.container{max-width:400px;margin:auto;}

input{
 width:90%;padding:15px;margin:10px;
 font-size:18px;border-radius:10px;
 border:none;background:#1c1c1c;color:white;
}

button{
 width:90%;padding:15px;margin:10px;
 font-size:18px;border-radius:12px;
 border:none;background:#4caf50;color:white;
}

.card{
 background:#1c1c1c;
 padding:20px;
 border-radius:15px;
 margin-top:20px;
}

.bar{
 height:20px;background:#333;
 border-radius:10px;
 overflow:hidden;
}

.fill{
 height:100%;width:0%;
 background:#4caf50;
 transition:0.4s;
}
</style>
</head>

<body>

<div class="container">

<h1>🔋 EV Akkuraportti PRO+</h1>

<input id="max" placeholder="Max jännite (4.08)">
<input id="min" placeholder="Min jännite (4.06)">

<button onclick="laske()">Analysoi</button>
<button onclick="tallenna()">💾 Tallenna</button>
<button onclick="teePDF()">📄 PDF</button>
<button onclick="obdDemo()">🔵 OBD demo</button>

<div class="card">
  <h2 id="status">-</h2>
  <h1 id="soh">--%</h1>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <p id="details"></p>
</div>

<canvas id="chart"></canvas>

</div>

<script>
let historyData = JSON.parse(localStorage.getItem("evdata") || "[]");

// ===== ANALYYSI =====
function laske(){
 let max = parseFloat(document.getElementById("max").value);
 let min = parseFloat(document.getElementById("min").value);

 if(isNaN(max)||isNaN(min)){
   alert("Syötä arvot!");
   return;
 }

 let delta = max - min;
 let soh = 100 - (delta * 1200);
 soh = Math.max(0, Math.min(100, soh));

 let status = soh>90?"Erinomainen":soh>75?"Hyvä":soh>60?"Kohtalainen":"Heikko";
 let color = soh>90?"#00e676":soh>75?"#aeea00":soh>60?"#ffd600":"#ff1744";

 document.getElementById("soh").innerText = soh.toFixed(1)+"%";
 document.getElementById("status").innerText = status;

 let fill = document.getElementById("fill");
 fill.style.width = soh+"%";
 fill.style.background = color;

 document.getElementById("details").innerText =
 "DELTA: " + delta.toFixed(3) + " V";

 window.lastData = {
   soh:soh,
   delta:delta,
   date:new Date().toLocaleString(),
   status:status,
   color:color
 };
}

// ===== TALLENNUS =====
function tallenna(){
 if(!window.lastData){
   alert("Laske ensin!");
   return;
 }

 historyData.push(window.lastData);
 localStorage.setItem("evdata", JSON.stringify(historyData));

 alert("Tallennettu ✔");
 drawChart();
}

// ===== GRAAFI =====
function drawChart(){
 let ctx = document.getElementById("chart");

 if(window.chart) window.chart.destroy();

 window.chart = new Chart(ctx,{
   type:"line",
   data:{
     labels: historyData.map(d=>d.date),
     datasets:[{
       label:"SOH %",
       data: historyData.map(d=>d.soh),
       borderColor:"#4caf50",
       tension:0.3
     }]
   },
   options:{
     plugins:{legend:{labels:{color:"white"}}},
     scales:{
       x:{ticks:{color:"white"}},
       y:{ticks:{color:"white"},min:0,max:100}
     }
   }
 });
}

// ===== AVILOO-TYYLINEN PDF =====
function teePDF(){
 if(!window.lastData){
   alert("Laske ensin!");
   return;
 }

 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();

 let d = window.lastData;

 // HEADER
 doc.setFillColor(20,20,20);
 doc.rect(0,0,210,30,"F");

 doc.setTextColor(255,255,255);
 doc.setFontSize(18);
 doc.text("EV AKKURAPORTTI PRO+", 20,20);

 // SOH ISO
 doc.setTextColor(0,0,0);
 doc.setFontSize(40);
 doc.text(d.soh.toFixed(1)+"%", 20,60);

 // STATUS
 let c = hexToRgb(d.color);
 doc.setTextColor(c.r,c.g,c.b);
 doc.setFontSize(16);
 doc.text(d.status.toUpperCase(), 20,75);

 // BAR
 doc.setDrawColor(200,200,200);
 doc.rect(20,85,170,10);

 doc.setFillColor(c.r,c.g,c.b);
 doc.rect(20,85,(d.soh/100)*170,10,"F");

 // DATA
 doc.setTextColor(0,0,0);
 doc.setFontSize(12);

 doc.text("DELTA: "+d.delta.toFixed(3)+" V", 20,110);
 doc.text("AIKA: "+d.date, 20,120);

 doc.save("EV_Akkuraportti_PRO.pdf");
}

// HEX → RGB
function hexToRgb(hex){
 let bigint = parseInt(hex.replace("#",""),16);
 return {
   r:(bigint>>16)&255,
   g:(bigint>>8)&255,
   b:bigint&255
 };
}

// ===== OBD DEMO =====
function obdDemo(){
 let max = 4.1 + Math.random()*0.02;
 let min = 4.05 + Math.random()*0.02;

 document.getElementById("max").value = max.toFixed(3);
 document.getElementById("min").value = min.toFixed(3);

 laske();
}

// INIT
drawChart();
</script>

</body>
</html>
