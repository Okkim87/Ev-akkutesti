<!DOCTYPE html>
<html lang="fi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Akkuraportti PRO+</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#0d0d0d; color:white; text-align:center; padding:20px;}
.container { max-width:400px; margin:auto;}
input,button { width:100%; padding:15px; margin:10px 0; font-size:18px; border-radius:10px; border:none;}
input { background:#1c1c1c; color:white;}
button { background:#00c853; color:white;}
.card { background:#1a1a1a; padding:20px; border-radius:15px; margin-top:20px;}
.bar { height:20px; background:#333; border-radius:10px; overflow:hidden;}
.fill { height:100%; width:0%; background:green;}
.big { font-size:40px;}
</style>
</head>

<body>

<div class="container">

<h1>🔋 EV Akkuraportti PRO+</h1>

<input id="max" placeholder="MAX (4.09)">
<input id="min" placeholder="MIN (4.06)">

<button onclick="laske()">Analysoi</button>
<button onclick="tallenna()">💾 Tallenna</button>
<button onclick="teePDF()">📄 PDF</button>
<button onclick="obd()">🔵 OBD (demo)</button>

<div class="card">
  <div id="status">-</div>
  <div class="big" id="soh">--%</div>
  <div class="bar"><div id="fill" class="fill"></div></div>
  <div id="details"></div>
</div>

<canvas id="chart"></canvas>

</div>

<script>
let history = JSON.parse(localStorage.getItem("akkuData") || "[]");

function laske(){
 let max=parseFloat(maxEl.value);
 let min=parseFloat(minEl.value);
 if(isNaN(max)||isNaN(min)) return;

 let delta=max-min;
 let soh=100-(delta*1200);
 soh=Math.max(0,Math.min(100,soh));

 let status=soh>90?"Erinomainen":soh>75?"Hyvä":soh>60?"Kohtalainen":"Heikko";
 let color=soh>90?"#00e676":soh>75?"#aeea00":soh>60?"#ffd600":"#ff1744";

 document.getElementById("soh").innerText=soh.toFixed(1)+"%";
 document.getElementById("status").innerText=status;

 let fill=document.getElementById("fill");
 fill.style.width=soh+"%";
 fill.style.background=color;

 document.getElementById("details").innerHTML=
 "DELTA: "+delta.toFixed(3)+" V";

 window.lastData={soh,delta,date:new Date().toLocaleTimeString()};
}

function tallenna(){
 if(!window.lastData) return;
 history.push(window.lastData);
 localStorage.setItem("akkuData",JSON.stringify(history));
 piirra();
}

function piirra(){
 let ctx=document.getElementById("chart");
 let labels=history.map(x=>x.date);
 let data=history.map(x=>x.soh);

 new Chart(ctx,{
   type:'line',
   data:{
     labels:labels,
     datasets:[{
       label:'SOH %',
       data:data
     }]
   }
 });
}

function teePDF(){
 if(!window.lastData) return;
 const { jsPDF } = window.jspdf;
 let doc=new jsPDF();

 doc.text("EV Akkuraportti",20,20);
 doc.text("SOH: "+lastData.soh.toFixed(1)+"%",20,40);
 doc.text("DELTA: "+lastData.delta.toFixed(3),20,50);

 doc.save("akku_raportti.pdf");
}

function obd(){
 alert("Tähän voidaan liittää OBD Bluetooth myöhemmin 🔵");
}

piirra();
</script>

</body>
</html>
