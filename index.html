<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EV Akkuraportti PRO+</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  background:#0d0d0d;
  color:white;
  font-family:sans-serif;
  text-align:center;
}
.container{max-width:420px;margin:auto;}

input{
 width:90%;padding:15px;margin:10px;
 font-size:16px;border-radius:10px;
 border:none;background:#1c1c1c;color:white;
}

button{
 width:90%;padding:15px;margin:10px;
 font-size:18px;border-radius:10px;
 border:none;background:#4caf50;color:white;
}

.card{
 background:#1c1c1c;
 padding:20px;
 border-radius:15px;
 margin-top:20px;
}

.bar{
 height:20px;background:#333;
 border-radius:10px;
 overflow:hidden;
}

.fill{
 height:100%;
 width:0%;
 background:#4caf50;
}

canvas{
 margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔋 EV Akkuraportti PRO+</h1>

<!-- AUTOTIEDOT -->
<input id="car" placeholder="Auto (esim. Tesla Model 3)">
<input id="vin" placeholder="VIN (valinnainen)">
<input id="owner" placeholder="Asiakas / omistaja">

<!-- MITTAUS -->
<input id="max" placeholder="Max jännite (4.08)">
<input id="min" placeholder="Min jännite (4.06)">

<button onclick="laske()">Analysoi</button>
<button onclick="tallenna()">💾 Tallenna</button>
<button onclick="teePDF()">📄 PDF</button>
<button onclick="obdDemo()">🔵 OBD demo</button>

<div class="card">
  <h2 id="status">-</h2>
  <h1 id="soh">--%</h1>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <p id="details"></p>
</div>

<canvas id="chart"></canvas>

</div>

<script>

// ===== DATA =====
let historyData = JSON.parse(localStorage.getItem("evdata") || "[]");

// ===== AUTOTÄYTTÖ =====
let savedMeta = JSON.parse(localStorage.getItem("evmeta") || "{}");

if(savedMeta.car) document.getElementById("car").value = savedMeta.car;
if(savedMeta.vin) document.getElementById("vin").value = savedMeta.vin;
if(savedMeta.owner) document.getElementById("owner").value = savedMeta.owner;

// ===== ANALYYSI =====
function laske(){
 let max = parseFloat(document.getElementById("max").value);
 let min = parseFloat(document.getElementById("min").value);

 if(isNaN(max)||isNaN(min)){
   alert("Syötä arvot!");
   return;
 }

 let delta = max - min;
 let soh = 100 - (delta * 1200);
 soh = Math.max(0, Math.min(100, soh));

 let status = soh>90?"Erinomainen":soh>75?"Hyvä":soh>60?"Kohtalainen":"Heikko";
 let color = soh>90?"#00e676":soh>75?"#aeea00":soh>60?"#ffd600":"#ff1744";

 document.getElementById("soh").innerText = soh.toFixed(1)+"%";
 document.getElementById("status").innerText = status;

 let fill = document.getElementById("fill");
 fill.style.width = soh+"%";
 fill.style.background = color;

 document.getElementById("details").innerText =
 "DELTA: " + delta.toFixed(3) + " V";

 window.lastData = {
   soh:soh,
   delta:delta,
   date:new Date().toLocaleString(),
   status:status,
   color:color,
   car: document.getElementById("car").value || "-",
   vin: document.getElementById("vin").value || "-",
   owner: document.getElementById("owner").value || "-"
 };
}

// ===== TALLENNUS =====
function tallenna(){
 if(!window.lastData){
   alert("Laske ensin!");
   return;
 }

 historyData.push(window.lastData);
 localStorage.setItem("evdata", JSON.stringify(historyData));

 localStorage.setItem("evmeta", JSON.stringify({
   car: document.getElementById("car").value,
   vin: document.getElementById("vin").value,
   owner: document.getElementById("owner").value
 }));

 alert("Tallennettu ✔");
 drawChart();
}

// ===== GRAAFI =====
function drawChart(){
 let ctx = document.getElementById("chart");

 if(window.chart) window.chart.destroy();

 window.chart = new Chart(ctx,{
   type:"line",
   data:{
     labels: historyData.map(d=>d.date),
     datasets:[{
       label:"SOH %",
       data: historyData.map(d=>d.soh),
       borderWidth:2
     }]
   }
 });
}

// ===== HEX → RGB =====
function hexToRgb(hex){
 let bigint = parseInt(hex.replace("#",""),16);
 return {
   r:(bigint>>16)&255,
   g:(bigint>>8)&255,
   b:bigint&255
 };
}

// ===== PDF =====
function teePDF(){
 if(!window.lastData){
   alert("Laske ensin!");
   return;
 }

 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();

 let d = window.lastData;
 let c = hexToRgb(d.color);

 // HEADER
 doc.setFillColor(20,20,20);
 doc.rect(0,0,210,30,"F");

 doc.setTextColor(255,255,255);
 doc.setFontSize(18);
 doc.text("BATTERY HEALTH CERTIFICATE", 20,18);

 doc.setFontSize(10);
 doc.text("EV Akkuraportti PRO+", 20,25);

 // TOP BAR
 doc.setFillColor(60,140,200);
 doc.rect(0,30,210,20,"F");

 let range = Math.round(300 + (d.soh/100)*150);

 doc.setTextColor(255,255,255);
 doc.setFontSize(16);
 doc.text(range + " km", 20,43);
 doc.text(d.soh.toFixed(1) + "%", 160,43);

 // TITLE
 doc.setTextColor(0,0,0);
 doc.setFontSize(22);
 doc.text("AKKUSERFIKAATTI", 20,65);

 // LEFT
 doc.setFontSize(11);
 doc.text("Ajoneuvon tiedot", 20,80);

 doc.text("Auto:", 20,90);
 doc.text(d.car, 60,90);

 doc.text("VIN:", 20,100);
 doc.text(d.vin, 60,100);

 doc.text("Asiakas:", 20,110);
 doc.text(d.owner, 60,110);

 doc.text("Päivä:", 20,120);
 doc.text(d.date, 60,120);

 // RIGHT
 doc.text("Testitulokset", 120,80);

 doc.text("SOH:", 120,90);
 doc.setFontSize(14);
 doc.text(d.soh.toFixed(1) + " %", 160,90);

 doc.setFontSize(11);
 doc.text("Delta:", 120,100);
 doc.text(d.delta.toFixed(3) + " V", 160,100);

 doc.text("Status:", 120,110);
 doc.setTextColor(c.r,c.g,c.b);
 doc.text(d.status, 160,110);

 doc.setTextColor(0,0,0);

 // ISO SOH
 doc.setFontSize(36);
 doc.text(d.soh.toFixed(1) + "%", 20,155);

 doc.setFontSize(14);
 doc.setTextColor(c.r,c.g,c.b);
 doc.text(d.status.toUpperCase(), 20,165);

 doc.setTextColor(0,0,0);

 // BAR
 doc.rect(20,175,170,10);
 doc.setFillColor(c.r,c.g,c.b);
 doc.rect(20,175,(d.soh/100)*170,10,"F");

 doc.setFontSize(10);
 doc.text("Delta: " + d.delta.toFixed(3) + " V", 20,195);

 // GRAAFI
 if(historyData.length > 1){
   let canvas = document.getElementById("chart");
   let img = canvas.toDataURL("image/png");

   doc.text("Historia", 20,210);
   doc.addImage(img,"PNG",20,215,170,50);
 }

 // FOOTER
 doc.setFontSize(9);
 doc.setTextColor(80);

 doc.text("Testaaja: autosähköapu.fi", 20,275);

 doc.text(
 "Mittaus perustuu kennokohtaiseen jännite-eroon mittaushetkellä.",
 20,282
 );

 doc.setFontSize(8);
 doc.text(
 "Raportti on suuntaa-antava eikä vastaa valmistajan virallista diagnoosia.",
 20,288
 );

 doc.save("EV_Certificate.pdf");
}

// ===== OBD DEMO =====
function obdDemo(){
 let max = 4.1 + Math.random()*0.02;
 let min = 4.05 + Math.random()*0.02;

 document.getElementById("max").value = max.toFixed(3);
 document.getElementById("min").value = min.toFixed(3);

 laske();
}

// INIT
drawChart();

</script>

</body>
</html>
