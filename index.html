
<!DOCTYPE html>
<html lang="fi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Akkuraportti PRO</title>

<style>
body {
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
}

h1 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: #1c1c1c;
  color: white;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  background: linear-gradient(90deg,#00c853,#00e676);
  border: none;
  border-radius: 12px;
  color: white;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
}

.bar {
  height: 20px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
}

.fill {
  height: 100%;
  width: 0%;
  background: green;
  transition: 0.5s;
}

.good { color: #00e676; }
.ok { color: #ffd600; }
.bad { color: #ff1744; }

.big {
  font-size: 40px;
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>🔋 EV Akkuraportti PRO</h1>

<input id="max" placeholder="MAX jännite (4.09)">
<input id="min" placeholder="MIN jännite (4.06)">

<button onclick="laske()">Analysoi akku</button>

<div class="card">
  <div id="status">Syötä arvot</div>
  <div class="big" id="soh">--%</div>

  <div class="bar">
    <div id="fill" class="fill"></div>
  </div>

  <div id="details"></div>
</div>

</div>

<script>
function laske(){

  let max = parseFloat(document.getElementById("max").value);
  let min = parseFloat(document.getElementById("min").value);

  if (isNaN(max) || isNaN(min)) return;

  let delta = max - min;

  // Parempi SOH logiikka
  let soh = 100 - (delta * 1200);

  soh = Math.max(0, Math.min(100, soh));

  let status = "";
  let color = "";

  if (soh > 90) {
    status = "Erinomainen";
    color = "#00e676";
  } else if (soh > 75) {
    status = "Hyvä";
    color = "#aeea00";
  } else if (soh > 60) {
    status = "Kohtalainen";
    color = "#ffd600";
  } else {
    status = "Heikko";
    color = "#ff1744";
  }

  document.getElementById("soh").innerText = soh.toFixed(1) + "%";
  document.getElementById("status").innerText = status;

  let fill = document.getElementById("fill");
  fill.style.width = soh + "%";
  fill.style.background = color;

  document.getElementById("details").innerHTML =
    "DELTA: " + delta.toFixed(3) + " V<br>" +
    "Erotus kertoo kennotasapainon.<br>" +
    (delta < 0.01 ? "✔ Erinomainen tasapaino" :
     delta < 0.02 ? "✔ Hyvä tasapaino" :
     delta < 0.04 ? "⚠ Epätasapainoa" :
     "❌ Huono tasapaino");

}
</script>

</body>
</html>
