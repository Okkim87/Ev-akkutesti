<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EV Akkuraportti PRO+</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<style>
body{background:#0d0d0d;color:white;font-family:sans-serif;text-align:center;}
.container{max-width:400px;margin:auto;}
input{width:90%;padding:15px;margin:10px;font-size:18px;border-radius:10px;border:none;background:#1c1c1c;color:white;}
button{width:90%;padding:15px;margin:10px;font-size:18px;border-radius:10px;border:none;background:#4caf50;color:white;}
.card{background:#1c1c1c;padding:20px;border-radius:15px;margin-top:20px;}
.bar{height:20px;background:#333;border-radius:10px;overflow:hidden;}
.fill{height:100%;width:0%;background:#4caf50;}
</style>
</head>

<body>

<div class="container">

<h1>🔋 EV Akkuraportti PRO+</h1>

<input id="max" placeholder="Max jännite (4.08)">
<input id="min" placeholder="Min jännite (4.06)">

<button onclick="laske()">Analysoi</button>
<button onclick="tallenna()">💾 Tallenna</button>
<button onclick="teePDF()">📄 PDF</button>
<button onclick="obdDemo()">🔵 OBD demo</button>

<div class="card">
  <h2 id="status">-</h2>
  <h1 id="soh">--%</h1>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <p id="details"></p>
</div>

<canvas id="chart"></canvas>

</div>

<script>
let historyData = JSON.parse(localStorage.getItem("evdata") || "[]");

function laske(){
 let max = parseFloat(document.getElementById("max").value);
 let min = parseFloat(document.getElementById("min").value);

 if(isNaN(max)||isNaN(min)){
   alert("Syötä arvot!");
   return;
 }

 let delta = max - min;
 let soh = 100 - (delta * 1200);
 soh = Math.max(0, Math.min(100, soh));

 let status = soh>90?"Erinomainen":soh>75?"Hyvä":soh>60?"Kohtalainen":"Heikko";
 let color = soh>90?"#00e676":soh>75?"#aeea00":soh>60?"#ffd600":"#ff1744";

 document.getElementById("soh").innerText = soh.toFixed(1)+"%";
 document.getElementById("status").innerText = status;

 let fill = document.getElementById("fill");
 fill.style.width = soh+"%";
 fill.style.background = color;

 document.getElementById("details").innerText =
 "DELTA: " + delta.toFixed(3) + " V";

 window.lastData = {soh,delta,date:new Date().toLocaleString()};
}

function tallenna(){
 if(!window.lastData){
   alert("Laske ensin!");
   return;
 }

 historyData.push(window.lastData);
 localStorage.setItem("evdata", JSON.stringify(historyData));
 drawChart();
}

function drawChart(){
 let ctx = document.getElementById("chart");

 if(window.chart) window.chart.destroy();

 window.chart = new Chart(ctx,{
   type:"line",
   data:{
     labels: historyData.map(d=>d.date),
     datasets:[{
       label:"SOH %",
       data: historyData.map(d=>d.soh)
     }]
   }
 });
}

function teePDF(){
 if(!window.lastData){
   alert("Laske ensin!");
   return;
 }

 const { jsPDF } = window.jspdf;
 let doc = new jsPDF();

 doc.setFontSize(18);
 doc.text("EV AKKURAPORTTI", 20, 20);

 doc.setFontSize(12);
 doc.text("SOH: " + window.lastData.soh.toFixed(1) + "%", 20, 40);
 doc.text("DELTA: " + window.lastData.delta.toFixed(3) + " V", 20, 50);
 doc.text("Aika: " + window.lastData.date, 20, 60);

 doc.save("EV_raportti.pdf");
}

function obdDemo(){
 let max = 4.1 + Math.random()*0.02;
 let min = 4.05 + Math.random()*0.02;

 document.getElementById("max").value = max.toFixed(3);
 document.getElementById("min").value = min.toFixed(3);

 laske();
}

drawChart();
</script>

</body>
</html>
